# Experiment queue — inference-research/autoresearch
#
# Active ablation study: Progressive inference optimization on Qwen2.5-7B-Instruct
#   Framework: vLLM standalone → llm-d (single-node, no PD disagg needed for 7B)
#   Hardware:  DGX Spark GB10 (SM121, arm64, 128GB unified memory)
#   Node:      spark-01 (192.168.1.76)
#   Model:     Qwen/Qwen2.5-7B-Instruct (7B dense, ~14 GB BF16)
#
# Each experiment adds ONE optimization on top of the previous best config.
# Baseline config uses enforce_eager=True for fast iteration; CUDA graphs added last.
#
# Archived entries below the active experiments preserve prior Qwen3 work.

experiments:

  # ── ACTIVE ABLATION: Qwen2.5-7B-Instruct ────────────────────────────────────

  - name: qwen25-7b-standalone-baseline
    status: completed
    date_run: '2026-04-08'
    priority: 1
    depends_on: null
    framework: vllm-standalone
    model: Qwen/Qwen2.5-7B-Instruct
    node_config:
      single: spark-01
    endpoint: http://10.244.2.91:8000
    config:
      enforce_eager: true
      dtype: bfloat16
      gpu_memory_utilization: 0.70
      max_model_len: 32768
      enable_prefix_caching: true
      enable_chunked_prefill: false
    hypothesis: >
      Standalone vLLM baseline. Establishes throughput and TTFT/ITL floor for
      Qwen2.5-7B on GB10 spark-01. enforce_eager=True for fast startup.
    result:
      c1:  { throughput_tok_s: 12.7,  ttft_p50_ms: 84.7,   ttft_p99_ms: 626.1,  itl_p50_ms: 78.47, itl_p99_ms: 78.89,  ok: 50 }
      c8:  { throughput_tok_s: 106.4, ttft_p50_ms: 198.7,  ttft_p99_ms: 3280.4, itl_p50_ms: 65.03, itl_p99_ms: 65.12,  ok: 50 }
      c32: { throughput_tok_s: 347.1, ttft_p50_ms: 282.6,  ttft_p99_ms: 286.2,  itl_p50_ms: 71.58, itl_p99_ms: 71.59,  ok: 50 }
      notes: >
        High TTFT p99 at c=8 (3280ms) — head-of-line blocking without chunked prefill.
        ITL very consistent at c=32 (p50≈p99=71.6ms). Throughput scales well:
        12.7→106.4→347.1 tok/s (27x from c=1 to c=32).

  - name: qwen25-7b-llmd-baseline
    status: completed
    date_run: '2026-04-08'
    priority: 2
    depends_on: qwen25-7b-standalone-baseline
    framework: llm-d
    model: Qwen/Qwen2.5-7B-Instruct
    node_config:
      single: spark-01
    config:
      enforce_eager: true
      dtype: bfloat16
      gpu_memory_utilization: 0.70
      max_model_len: 32768
      enable_prefix_caching: true
      enable_chunked_prefill: false
    hypothesis: >
      Same model via llm-d ModelService (EPP + routing sidecar). Measures
      overhead/benefit of llm-d routing layer vs plain vLLM.
    result:
      c1:  { throughput_tok_s: 12.7,  ttft_p50_ms: 83.0,  ttft_p99_ms: 198.0,  itl_p50_ms: 78.47, ok: 50 }
      c8:  { throughput_tok_s: 106.0, ttft_p50_ms: 216.0, ttft_p99_ms: 3399.0, itl_p50_ms: 65.12, ok: 50 }
      c32: { throughput_tok_s: 348.2, ttft_p50_ms: 326.8, ttft_p99_ms: 367.0,  itl_p50_ms: 71.68, ok: 50 }
      notes: >
        llm-d adds zero throughput overhead (+0.3% vs standalone at c=32).
        TTFT p99 at c=1 dramatically LOWER (198ms vs 626ms standalone, -68%) —
        EPP routing provides better request scheduling for single requests.
        TTFT p50 at c=32 slightly higher (+16%, 327ms vs 283ms) from routing hop.
        ITL identical across all levels. Key finding: use llm-d with confidence.

  - name: qwen25-7b-llmd-prefix-cache
    status: completed
    date_run: '2026-04-08'
    priority: 3
    depends_on: qwen25-7b-llmd-baseline
    framework: llm-d
    model: Qwen/Qwen2.5-7B-Instruct
    node_config:
      single: spark-01
    config:
      enforce_eager: true
      dtype: bfloat16
      gpu_memory_utilization: 0.70
      max_model_len: 32768
      enable_prefix_caching: true   # already on — measure hit rate impact explicitly
      enable_chunked_prefill: false
    hypothesis: >
      Prefix caching (APC) reuses KV cache blocks for shared prompt prefixes.
      Expected to reduce TTFT p50 by 20-40% for cache-warm requests. Measure
      both cold-cache (first request) and warm-cache (repeated prefix) TTFT.
    expected_metrics:
      ttft_p50_delta: -20% to -40% warm cache
      throughput_delta: neutral to +5%
    result:
      c1:  { throughput_tok_s: 12.7,  ttft_p50_ms: 84.0,  ttft_p99_ms: 304.0,  itl_p50_ms: 78.6, itl_p99_ms: 78.9,  ok: 50 }
      c8:  { throughput_tok_s: 109.2, ttft_p50_ms: 198.0, ttft_p99_ms: 219.0,  itl_p50_ms: 65.1, itl_p99_ms: 65.1,  ok: 50 }
      c32: { throughput_tok_s: 350.6, ttft_p50_ms: 188.0, ttft_p99_ms: 214.0,  itl_p50_ms: 71.6, itl_p99_ms: 71.6,  ok: 50 }
      notes: >
        Warm prefix cache delivers strong TTFT improvements. TTFT p99 at c=8
        dropped from 3399ms → 219ms (-94%) — cache eliminates head-of-line blocking.
        TTFT p50 at c=32 dropped from 327ms → 188ms (-42%). Throughput neutral (+0.7%).
        Key finding: prefix cache is essential for low-latency high-concurrency serving.

  - name: qwen25-7b-llmd-chunked-prefill
    status: completed
    date_run: '2026-04-08'
    priority: 4
    depends_on: qwen25-7b-llmd-baseline
    framework: llm-d
    model: Qwen/Qwen2.5-7B-Instruct
    node_config:
      single: spark-01
    config:
      enforce_eager: true
      dtype: bfloat16
      gpu_memory_utilization: 0.70
      max_model_len: 32768
      enable_prefix_caching: false
      enable_chunked_prefill: true
      chunked_prefill_size: 512
    hypothesis: >
      Chunked prefill splits long prompts across decode steps, reducing head-of-line
      blocking at high concurrency. Expected to reduce TTFT p99 at c=32 by
      smoothing prefill latency spikes. Independent axis from prefix cache.
    expected_metrics:
      ttft_p99_delta: -20% to -30% at c=32
      throughput_delta: neutral
    result:
      c1:  { throughput_tok_s: 12.6,  ttft_p50_ms: 80.0,  ttft_p99_ms: 177.0,  itl_p50_ms: 79.2, itl_p99_ms: 79.7,  ok: 50 }
      c8:  { throughput_tok_s: 108.6, ttft_p50_ms: 200.0, ttft_p99_ms: 3330.0, itl_p50_ms: 63.7, itl_p99_ms: 63.7,  ok: 50 }
      c32: { throughput_tok_s: 354.1, ttft_p50_ms: 239.0, ttft_p99_ms: 315.0,  itl_p50_ms: 70.5, itl_p99_ms: 70.6,  ok: 50 }
      notes: >
        Chunked prefill reduces TTFT p50 at c=32 by -27% (327ms→239ms) vs llm-d baseline.
        TTFT p99 at c=32 dropped -14% (367ms→315ms) — below the -20-30% hypothesis.
        c=8 HOL blocking not fixed (p99 3399ms→3330ms, -2%) — requires prefix cache for that.
        Throughput +1.7% at c=32. Key finding: chunked prefill helps high-concurrency
        latency but prefix cache is the primary lever for c=8 tail latency.

  - name: qwen25-7b-llmd-higher-mem
    status: completed
    date_run: '2026-04-08'
    priority: 5
    depends_on: qwen25-7b-llmd-prefix-cache
    framework: llm-d
    model: Qwen/Qwen2.5-7B-Instruct
    node_config:
      single: spark-01
    config:
      enforce_eager: true
      dtype: bfloat16
      gpu_memory_utilization: 0.85   # up from 0.70
      max_model_len: 32768
      enable_prefix_caching: true
      enable_chunked_prefill: false
    hypothesis: >
      7B model weights occupy ~14 GB; GB10 has 128 GB unified memory. Increasing
      gpu_memory_utilization from 0.70 to 0.85 frees ~19 GB more for KV cache,
      enabling larger batch sizes. Expected +15-25% throughput at high concurrency.
    expected_metrics:
      throughput_delta: +15% to +25% at c=32
    result:
      c1:  { throughput_tok_s: 12.7,  ttft_p50_ms: 84.0,  ttft_p99_ms: 165.0,  itl_p50_ms: 78.4, itl_p99_ms: 78.8, ok: 50 }
      c8:  { throughput_tok_s: 105.7, ttft_p50_ms: 201.0, ttft_p99_ms: 3465.0, itl_p50_ms: 65.3, itl_p99_ms: 65.5, ok: 50 }
      c32: { throughput_tok_s: 348.9, ttft_p50_ms: 193.0, ttft_p99_ms: 286.0,  itl_p50_ms: 71.9, itl_p99_ms: 72.0, ok: 50 }
      notes: >
        Higher gpu_memory_utilization (0.85 vs 0.70) yielded zero throughput improvement (+0.2%).
        For Qwen2.5-7B at c=32 with 256-token outputs, KV cache memory was not the bottleneck.
        Cold cache (redeployment) restored c=8 TTFT p99 to 3465ms. Hypothesis not confirmed.
        Key finding: memory headroom is not the limiting factor for 7B at these concurrency levels.

  - name: qwen25-7b-llmd-fp8-kv
    status: completed
    date_run: '2026-04-08'
    priority: 6
    depends_on: qwen25-7b-llmd-higher-mem
    framework: llm-d
    model: Qwen/Qwen2.5-7B-Instruct
    node_config:
      single: spark-01
    config:
      enforce_eager: true
      dtype: bfloat16
      kv_cache_dtype: fp8
      gpu_memory_utilization: 0.85
      max_model_len: 32768
      enable_prefix_caching: true
      enable_chunked_prefill: false
    hypothesis: >
      FP8 KV cache halves KV memory footprint vs BF16, roughly doubling available
      KV cache slots. GB10 SM121 has native FP8 tensor core support. Expected
      +20-40% throughput from larger effective batch capacity.
    expected_metrics:
      throughput_delta: +20% to +40%
      itl_p50_delta: -10% to -20% from larger batches
    result:
      c1:  { throughput_tok_s: 12.5,  ttft_p50_ms: 142.0, ttft_p99_ms: 176.0, itl_p50_ms: 79.2, itl_p99_ms: 81.4, ok: 50 }
      c8:  { throughput_tok_s: 112.8, ttft_p50_ms: 193.0, ttft_p99_ms: 3458.0, itl_p50_ms: 63.3, itl_p99_ms: 65.4, ok: 50 }
      c32: { throughput_tok_s: 334.5, ttft_p50_ms: 248.0, ttft_p99_ms: 261.0, itl_p50_ms: 69.7, itl_p99_ms: 75.2, ok: 50 }
      notes: >
        FP8 KV cache REGRESSED vs higher-mem baseline: throughput -4.2% (348.9→334.5 tok/s),
        TTFT p50 at c=32 +28% (193→248ms). FP8 quantization overhead outweighs memory savings
        for Qwen2.5-7B at these concurrency levels. Hypothesis of +20-40% throughput not confirmed.
        GB10 SM121 FP8 tensor cores do not compensate for per-access quantize/dequantize cost.

  - name: qwen25-7b-llmd-spec-decoding
    status: completed
    date_run: '2026-04-08'
    priority: 7
    depends_on: qwen25-7b-llmd-fp8-kv
    framework: llm-d
    model: Qwen/Qwen2.5-7B-Instruct
    node_config:
      single: spark-01
    config:
      enforce_eager: true
      dtype: bfloat16
      kv_cache_dtype: fp8
      gpu_memory_utilization: 0.85
      max_model_len: 32768
      enable_prefix_caching: true
      enable_chunked_prefill: false
      speculative_decoding:
        method: ngram
        num_speculative_tokens: 5
    hypothesis: >
      Speculative decoding proposes N tokens per step; target model verifies in
      parallel. ngram spec decoding as baseline (no draft model needed). Expected
      -30% to -50% ITL improvement for typical chat/instruction completions.
    expected_metrics:
      itl_p50_delta: -30% to -50%
      throughput_delta: +10% to +20%
    result:
      c1:  { throughput_tok_s: 12.6, ttft_p50_ms: 80.0,  ttft_p99_ms: 142.0, itl_p50_ms: 79.9, itl_p99_ms: 82.7,  ok: 50 }
      c8:  { throughput_tok_s: 100.0, ttft_p50_ms: 143.0, ttft_p99_ms: 244.0, itl_p50_ms: 69.7, itl_p99_ms: 75.8,  ok: 50 }
      c32: { throughput_tok_s: 304.6, ttft_p50_ms: 170.0, ttft_p99_ms: 173.0, itl_p50_ms: 76.6, itl_p99_ms: 89.6,  ok: 50 }
      notes: >
        Spec decoding HURT throughput (-9%, 334.5→304.6 tok/s at c=32) and ITL (+10% worse).
        TTFT improved: p50 at c=32 -31% (248→170ms), c=8 p99 -93% (3458→244ms) — warm cache effect.
        Low ngram acceptance rate at high concurrency drives proposal overhead without yield.
        Hypothesis of -30-50% ITL improvement NOT confirmed. ITL worsened.
        Key finding: ngram spec decoding unsuitable for diverse completions at high concurrency.

  - name: qwen25-7b-llmd-cuda-graphs
    status: pending
    priority: 8
    depends_on: qwen25-7b-llmd-spec-decoding
    framework: llm-d
    model: Qwen/Qwen2.5-7B-Instruct
    node_config:
      single: spark-01
    config:
      enforce_eager: false   # CUDA graphs enabled
      dtype: bfloat16
      kv_cache_dtype: fp8
      gpu_memory_utilization: 0.85
      max_model_len: 32768
      enable_prefix_caching: true
      enable_chunked_prefill: false
      speculative_decoding:
        method: ngram
        num_speculative_tokens: 5
    hypothesis: >
      CUDA graph capture replays decode forward pass as a pre-compiled kernel graph,
      eliminating Python/CUDA driver overhead. Prior Qwen3 experiments showed +15-20%
      throughput on GB10 SM121. Combined with FP8 KV + spec decoding.
    expected_metrics:
      throughput_delta: +15% to +20% vs previous
    notes: >
      RISK: CUDA graph capture may hang on GB10 unified memory. Monitor during
      first capture phase. Set NCCL_P2P_DISABLE=1 and NCCL_IB_DISABLE=1.

  - name: qwen25-7b-llmd-full-stack
    status: pending
    priority: 9
    depends_on: qwen25-7b-llmd-cuda-graphs
    framework: llm-d
    model: Qwen/Qwen2.5-7B-Instruct
    node_config:
      single: spark-01
    config:
      enforce_eager: false
      dtype: bfloat16
      kv_cache_dtype: fp8
      gpu_memory_utilization: 0.85
      max_model_len: 32768
      enable_prefix_caching: true
      enable_chunked_prefill: true
      chunked_prefill_size: 512
      speculative_decoding:
        method: ngram
        num_speculative_tokens: 5
      cuda_graphs: true
    hypothesis: >
      All validated optimizations combined: prefix cache + chunked prefill + FP8 KV
      + speculative decoding + CUDA graphs. Expected multiplicative gains across
      throughput AND latency simultaneously. Production-candidate configuration.
    expected_metrics:
      throughput_delta: +50% to +80% vs standalone baseline
      ttft_p50_delta: -25% to -40% vs baseline
      itl_p50_delta: -30% to -50% vs baseline
    notes: >
      Run last — validates full composition. If any metric regresses, bisect by
      disabling one optimization at a time.

